name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-test-pack:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Icm.Wpf.Controls.sln

      - name: Build
        run: dotnet build Icm.Wpf.Controls.sln -c Release --no-restore

      - name: Test
        run: dotnet test Icm.Wpf.Controls.sln -c Release --no-build

      - name: Pack
        run: dotnet pack src/Icm.Wpf.Controls/Icm.Wpf.Controls.csproj -c Release --no-build -o artifacts/packages

      - name: Publish GitHub package
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --name github --username "${{ github.repository_owner }}" --password "$env:NUGET_AUTH_TOKEN" --store-password-in-clear-text
          $package = Get-ChildItem -Path "artifacts/packages" -Filter "*.nupkg" | Select-Object -First 1
          if ($null -eq $package) {
            throw "No NuGet package found in artifacts/packages."
          }
          dotnet nuget push "$($package.FullName)" --source github --api-key "$env:NUGET_AUTH_TOKEN" --skip-duplicate
